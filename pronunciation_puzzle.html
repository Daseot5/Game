<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>한글 발음 퍼즐</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Malgun Gothic',sans-serif;background:#0d1b2e;color:#e8f0fe;min-height:100vh;overflow-x:hidden}
button{cursor:pointer;border:none;font-family:inherit}

/* ── SCREENS ── */
.screen{display:none;min-height:100vh;padding:16px;flex-direction:column}
.screen.active{display:flex}

/* ── HOME ── */
.home-header{text-align:center;padding:20px 0 16px}
.game-title{font-size:22px;font-weight:700;color:#7eb8ff;letter-spacing:3px}
.game-sub{font-size:11px;color:#3a6fd8;letter-spacing:4px;margin-top:4px}
.card-select-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.card-thumb{border-radius:10px;border:1.5px solid #1e3a6a;background:#0a1525;overflow:hidden;cursor:pointer;transition:transform .15s,border-color .2s;position:relative}
.card-thumb:active{transform:scale(.95)}
.card-thumb.complete{border-color:#3a8fff}
.card-thumb img{width:100%;height:120px;object-fit:cover;display:block}
.card-thumb .thumb-info{padding:8px;display:flex;justify-content:space-between;align-items:center}
.thumb-name{font-size:12px;font-weight:700;color:#7eb8ff}
.thumb-prog{font-size:10px;color:#4a7fc1}
.thumb-lock{position:absolute;inset:0;background:rgba(6,15,30,.6);display:flex;align-items:center;justify-content:center;font-size:32px}
.thumb-new{position:absolute;top:6px;right:6px;background:#3a8fff;color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px;letter-spacing:1px}
.home-btns{display:flex;flex-direction:column;gap:8px;margin-top:auto}
.hbtn{padding:12px;border-radius:7px;font-size:13px;font-weight:700;letter-spacing:.5px;display:flex;align-items:center;gap:10px}
.hbtn-ico{width:26px;height:26px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.btn-blue{background:#0e2a52;border:1.5px solid #3a8fff;color:#7eb8ff}
.btn-blue .hbtn-ico{background:#1e4080}
.btn-dim{background:#0a1a32;border:1.5px solid #1e3a6a;color:#4a7fc1}
.btn-dim .hbtn-ico{background:#0e2240}

/* ── CARD INTRO (explosion screen) ── */
#screen-intro{background:#060f1e;align-items:center;justify-content:center;overflow:hidden}
.intro-card-wrap{position:relative;width:280px;height:280px;margin-bottom:20px}
.intro-card-wrap canvas{width:100%;height:100%;border-radius:12px;border:2px solid #3a8fff}
.intro-title{font-size:18px;font-weight:700;color:#7eb8ff;text-align:center;margin-bottom:8px}
.intro-sub{font-size:12px;color:#4a7fc1;text-align:center;margin-bottom:20px}
.btn-start-game{padding:14px 32px;border-radius:8px;font-size:15px;font-weight:700;background:#0e2a52;border:2px solid #3a8fff;color:#7eb8ff;letter-spacing:1px}

/* ── PUZZLE GAME ── */
#screen-game{background:#0d1b2e}
.game-header{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.back-btn{padding:6px 11px;border-radius:6px;background:#0a1525;border:1px solid #1e3a6a;font-size:11px;color:#4a7fc1;font-weight:700}
.game-card-name{flex:1;font-size:13px;font-weight:700;color:#7eb8ff;text-align:center;letter-spacing:1px}
.piece-counter{font-size:12px;font-weight:700;color:#3a8fff}

/* puzzle grid */
.puzzle-area{position:relative;width:100%;max-width:340px;margin:0 auto 14px;aspect-ratio:1}
.puzzle-area canvas{width:100%;height:100%;display:block;border-radius:8px;border:1px solid #1e3a6a}

/* word challenge */
.challenge-box{background:#0a1525;border:1px solid #1e3a6a;border-radius:12px;padding:14px;margin-bottom:12px}
.piece-label{font-size:10px;color:#4a7fc1;margin-bottom:4px;letter-spacing:1px}
.word-display{font-size:28px;font-weight:700;color:#fff;text-align:center;margin:8px 0 4px;letter-spacing:4px}
.word-hint{font-size:11px;color:#4a7fc1;text-align:center;margin-bottom:10px}
.timer-bar-wrap{height:4px;background:#1a2a4a;border-radius:2px;margin-bottom:12px;overflow:hidden}
.timer-bar{height:100%;background:#3a8fff;border-radius:2px;transition:width .1s linear}
.rec-row{display:flex;gap:8px;align-items:center}
.btn-rec{flex:1;padding:12px;border-radius:7px;font-size:13px;font-weight:700;background:#0e2a52;border:1.5px solid #3a8fff;color:#7eb8ff;letter-spacing:.5px}
.btn-rec.recording{background:#1a0030;border-color:#aa44ff;color:#cc88ff;animation:pulse-rec .6s infinite alternate}
@keyframes pulse-rec{from{opacity:1}to{opacity:.6}}
.btn-pass{padding:12px 16px;border-radius:7px;font-size:12px;font-weight:700;background:#0a1a32;border:1px solid #1e3a6a;color:#4a7fc1}
.status-msg{text-align:center;font-size:12px;font-weight:700;min-height:18px;margin-bottom:8px}
.status-ok{color:#22cc55}
.status-ng{color:#cc4444}
.status-info{color:#4a7fc1}

/* result feedback */
.result-flash{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;font-size:64px;pointer-events:none;z-index:100;opacity:0;transition:opacity .2s}

/* ── COLLECTION ── */
#screen-collection{background:#0d1b2e}
.col-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;flex:1}
.col-card{border-radius:10px;border:1.5px solid #1e3a6a;overflow:hidden;cursor:pointer;transition:transform .15s}
.col-card:active{transform:scale(.95)}
.col-card.done{border-color:#3a8fff}
.col-card img{width:100%;height:130px;object-fit:cover;display:block}
.col-card .col-info{padding:8px}
.col-nm{font-size:12px;font-weight:700;color:#7eb8ff}
.col-prog{font-size:10px;color:#4a7fc1}
.col-words{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}
.col-word-chip{font-size:9px;padding:1px 5px;border-radius:3px;border:1px solid #1e3a6a;color:#4a7fc1}
.col-word-chip.done{border-color:#3a8fff;color:#7eb8ff}

/* ── SETTINGS / ADMIN ── */
#screen-settings{background:#0d1b2e}
.settings-section{background:#0a1525;border:1px solid #1e3a6a;border-radius:10px;padding:14px;margin-bottom:12px}
.settings-title{font-size:12px;color:#4a7fc1;font-weight:700;letter-spacing:2px;margin-bottom:10px}
.admin-gate{text-align:center;padding:8px 0}
.admin-hint{font-size:10px;color:#2a4a7a;margin-top:4px}
.admin-area{display:none}
.admin-area.open{display:block}
.field-label{font-size:10px;color:#4a7fc1;margin-bottom:4px;margin-top:10px;letter-spacing:1px}
.text-input{width:100%;padding:9px 12px;border-radius:6px;background:#060f1e;border:1px solid #1e3a6a;color:#e8f0fe;font-size:12px;font-family:inherit}
.text-input:focus{outline:none;border-color:#3a8fff}
.img-upload-btn{width:100%;padding:10px;border-radius:6px;background:#0e2a52;border:1.5px dashed #3a8fff;color:#7eb8ff;font-size:12px;font-weight:700;margin-top:6px;text-align:center}
.img-preview{width:100%;height:100px;object-fit:contain;border-radius:6px;background:#060f1e;border:1px solid #1e3a6a;margin-top:6px;display:none}
.btn-add-card{width:100%;padding:12px;border-radius:7px;font-size:13px;font-weight:700;background:#0e2a52;border:1.5px solid #3a8fff;color:#7eb8ff;margin-top:12px;letter-spacing:.5px}
.card-list-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #1a2a4a}
.cli-img{width:40px;height:40px;border-radius:5px;object-fit:cover;background:#060f1e}
.cli-info{flex:1}
.cli-name{font-size:12px;font-weight:700;color:#7eb8ff}
.cli-sub{font-size:9px;color:#4a7fc1;margin-top:1px}
.cli-del{padding:4px 8px;border-radius:4px;background:#2a0a0a;border:1px solid #cc2222;color:#cc4444;font-size:10px;font-weight:700}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.ttl{flex:1;font-size:13px;font-weight:700;color:#7eb8ff;text-align:center;letter-spacing:2px}

/* ── PIECE ANIMATE ── */
@keyframes pieceIn{from{transform:scale(0) rotate(20deg);opacity:0}to{transform:scale(1) rotate(0deg);opacity:1}}
@keyframes explode{from{transform:scale(1);opacity:1}to{transform:scale(2.5) rotate(15deg);opacity:0}}
.piece-anim-in{animation:pieceIn .4s cubic-bezier(.17,.67,.35,1.3) forwards}
.piece-anim-out{animation:explode .5s ease-in forwards}

/* ── MISC ── */
.spacer{flex:1}
.badge-new{background:#3a8fff;color:#fff;font-size:8px;font-weight:700;padding:1px 5px;border-radius:8px;letter-spacing:1px}
</style>
</head>
<body>

<!-- HOME -->
<div id="screen-home" class="screen active">
  <div class="home-header">
    <div class="game-title">한글 발음 퍼즐</div>
    <div class="game-sub">PRONUNCIATION PUZZLE</div>
  </div>
  <div class="card-select-grid" id="home-card-grid"></div>
  <div class="home-btns">
    <button class="hbtn btn-blue" onclick="goScreen('collection')">
      <div class="hbtn-ico">🗂</div>내 도감 보기
    </button>
    <button class="hbtn btn-dim" onclick="goScreen('settings')">
      <div class="hbtn-ico">⚙️</div>설정 / 관리자
    </button>
  </div>
</div>

<!-- CARD INTRO (card reveal + scatter) -->
<div id="screen-intro" class="screen">
  <div class="intro-title" id="intro-title">팬텀호넷</div>
  <div class="intro-card-wrap">
    <canvas id="intro-canvas" width="280" height="280"></canvas>
  </div>
  <div class="intro-sub" id="intro-sub">이 카드의 퍼즐을 완성해보세요!</div>
  <button class="btn-start-game" id="btn-start-game" onclick="startGame()">시작하기 →</button>
</div>

<!-- GAME -->
<div id="screen-game" class="screen">
  <div class="game-header">
    <button class="back-btn" onclick="goScreen('home')">← 홈</button>
    <div class="game-card-name" id="game-card-name">팬텀호넷</div>
    <div class="piece-counter" id="piece-counter">0/12</div>
  </div>
  <div class="puzzle-area">
    <canvas id="puzzle-canvas" width="320" height="320"></canvas>
  </div>
  <div class="challenge-box">
    <div class="piece-label" id="piece-label">STEP 1 / 12</div>
    <div class="word-display" id="word-display">가나</div>
    <div class="word-hint" id="word-hint">나라 이름 (아프리카)</div>
    <div class="timer-bar-wrap"><div class="timer-bar" id="timer-bar" style="width:100%"></div></div>
    <div class="status-msg" id="status-msg"></div>
    <div class="rec-row">
      <button class="btn-rec" id="btn-rec" onclick="toggleRecording()">🎤 녹음 시작 (5초)</button>
      <button class="btn-pass" onclick="passWord()">Pass →</button>
    </div>
  </div>
</div>

<!-- COLLECTION -->
<div id="screen-collection" class="screen">
  <div class="topbar">
    <button class="back-btn" onclick="goScreen('home')">← 홈</button>
    <div class="ttl">내 도감</div>
    <div style="width:48px"></div>
  </div>
  <div class="col-grid" id="col-grid"></div>
</div>

<!-- SETTINGS -->
<div id="screen-settings" class="screen">
  <div class="topbar">
    <button class="back-btn" onclick="goScreen('home')">← 홈</button>
    <div class="ttl">설정</div>
    <div style="width:48px"></div>
  </div>

  <div class="settings-section">
    <div class="settings-title">관리자 모드</div>
    <div class="admin-gate" id="admin-gate">
      <div style="display:flex;gap:6px;align-items:center">
        <input type="password" class="text-input" id="admin-pw" placeholder="관리자 비밀번호" style="flex:1">
        <button class="hbtn btn-blue" style="padding:9px 14px;font-size:12px" onclick="checkAdmin()">확인</button>
      </div>
      <div class="admin-hint">기본 비밀번호: 1234</div>
    </div>
    <div class="admin-area" id="admin-area">
      <div style="color:#22cc55;font-size:11px;margin-bottom:10px">✓ 관리자 모드 활성화</div>

      <div class="field-label">카드 이름</div>
      <input type="text" class="text-input" id="new-card-name" placeholder="예: 글로버">

      <div class="field-label">카드 이미지 업로드</div>
      <label class="img-upload-btn" for="img-file-input">📁 이미지 선택 (JPG/PNG/WebP)</label>
      <input type="file" id="img-file-input" accept="image/*" style="display:none" onchange="previewImg(event)">
      <img id="img-preview" class="img-preview" src="" alt="미리보기">

      <div class="field-label">발음 단어 목록 (12개, 줄바꿈으로 구분)</div>
      <div style="font-size:9px;color:#2a4a7a;margin-bottom:4px">형식: 단어|힌트 (예: 가나|나라 이름)</div>
      <textarea class="text-input" id="new-words" rows="8" placeholder="가나|나라 이름&#10;가을|봄 여름 ___ 겨울&#10;개나리|봄에 피는 노란 꽃&#10;...12개까지"></textarea>

      <button class="btn-add-card" onclick="addCard()">+ 카드 추가하기</button>

      <div class="settings-title" style="margin-top:16px">등록된 카드 목록</div>
      <div id="admin-card-list"></div>
    </div>
  </div>
</div>

<div class="result-flash" id="result-flash"></div>

// ── STATE ──
const SAVE_KEY='hpz_save_v3';
let state={
  cards:[],       // all card configs
  progress:{},    // {cardName: [0..11] piece indices earned}
  completed:[],   // card names fully done
  currentCard:null,
  currentPiece:0,
  recording:false,
  mediaRec:null,
  audioChunks:[],
  timerInt:null,
  timerLeft:5,
  adminOpen:false,
  newCardImg:null,
};

function loadState(){
  try{
    const s=JSON.parse(localStorage.getItem(SAVE_KEY)||'null');
    if(s){
      state.progress=s.progress||{};
      state.completed=s.completed||[];
      const customCards=s.customCards||[];
      state.cards=[...CARDS,...customCards];
    } else {
      state.cards=[...CARDS];
    }
  }catch(e){state.cards=[...CARDS];}
}
function saveState(){
  const customCards=state.cards.filter(c=>!CARDS.find(d=>d.name===c.name));
  localStorage.setItem(SAVE_KEY,JSON.stringify({
    progress:state.progress,
    completed:state.completed,
    customCards
  }));
}

// ── SCREENS ──
function goScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
  if(id==='home')renderHome();
  if(id==='collection')renderCollection();
  if(id==='settings')renderAdminList();
}

// ── HOME ──
function renderHome(){
  const grid=document.getElementById('home-card-grid');
  grid.innerHTML='';
  state.cards.forEach(card=>{
    const earned=(state.progress[card.name]||[]).length;
    const done=state.completed.includes(card.name);
    const div=document.createElement('div');
    div.className='card-thumb'+(done?' complete':'');
    const imgSrc=CARD_IMGS[card.name]||'';
    div.innerHTML=`
      <img src="${imgSrc}" style="width:100%;height:110px;object-fit:cover;display:block" onerror="this.style.background='#1a2a4a';this.src=''">
      <div class="thumb-info">
        <span class="thumb-name">${card.name}</span>
        <span class="thumb-prog">${earned}/12 ${done?'✓':''}</span>
      </div>
      ${done?'<div class="thumb-new">COMPLETE</div>':''}
    `;
    div.onclick=()=>openCardIntro(card);
    grid.appendChild(div);
  });
}

// ── CARD INTRO ──
let currentIntroCard=null;
function openCardIntro(card){
  currentIntroCard=card;
  goScreen('intro');
  document.getElementById('intro-title').textContent=card.name;
  const earned=state.progress[card.name]||[];
  const done=state.completed.includes(card.name);
  document.getElementById('intro-sub').textContent=
    done?`완성된 카드! 조각이 흩어집니다...`:`${earned.length}/12 조각 완성`;
  document.getElementById('btn-start-game').textContent='시작하기 →';
  drawIntroCard(card, done, earned);
  if(done) setTimeout(()=>scatterAnimation(card),500);
}

function drawIntroCard(card, done, earned){
  const canvas=document.getElementById('intro-canvas');
  const ctx=canvas.getContext('2d');
  const W=280,H=280;
  ctx.clearRect(0,0,W,H);
  const imgSrc=CARD_IMGS[card.name]||'';
  if(!imgSrc){ctx.fillStyle='#1a2a4a';ctx.fillRect(0,0,W,H);return;}
  const img=new Image();
  img.onload=()=>{
    // draw full image
    ctx.drawImage(img,0,0,W,H);
    if(!done){
      // overlay missing pieces dark
      const cols=3,rows=4,pw=W/cols,ph=H/rows;
      for(let i=0;i<12;i++){
        if(!earned.includes(i)){
          const col=i%cols,row=Math.floor(i/cols);
          ctx.fillStyle='rgba(6,15,30,0.82)';
          ctx.fillRect(col*pw,row*ph,pw,ph);
          ctx.strokeStyle='#1e3a6a';ctx.lineWidth=1;
          ctx.strokeRect(col*pw,row*ph,pw,ph);
          ctx.fillStyle='#1e3a6a';ctx.font='14px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
          ctx.fillText('?',col*pw+pw/2,row*ph+ph/2);
        }
      }
    }
  };
  img.src=imgSrc;
}

let scatterPieces=[];
function scatterAnimation(card){
  const canvas=document.getElementById('intro-canvas');
  const ctx=canvas.getContext('2d');
  const W=280,H=280;
  const cols=3,rows=4,pw=W/cols,ph=H/rows;
  const imgSrc=CARD_IMGS[card.name]||'';
  const img=new Image();
  img.onload=()=>{
    // animate scatter
    let t=0;
    const vels=Array.from({length:12},(_,i)=>({
      x:(Math.random()-.5)*8,y:(Math.random()-.5)*8,
      r:(Math.random()-.5)*.3,s:1,o:1
    }));
    const poses=Array.from({length:12},(_,i)=>({
      x:(i%cols)*pw,y:Math.floor(i/cols)*ph
    }));
    function step(){
      ctx.clearRect(0,0,W,H);
      let allGone=true;
      for(let i=0;i<12;i++){
        const v=vels[i],p=poses[i];
        p.x+=v.x;p.y+=v.y;v.s*=.94;v.o*=.93;v.r+=v.r*.05;
        if(v.o>0.02)allGone=false;
        ctx.save();
        ctx.globalAlpha=v.o;
        ctx.translate(p.x+pw/2,p.y+ph/2);
        ctx.rotate(v.r*t*.05);
        ctx.scale(v.s,v.s);
        ctx.drawImage(img,(i%cols)*pw,Math.floor(i/cols)*ph,pw,ph,-pw/2,-ph/2,pw,ph);
        ctx.restore();
      }
      t++;
      if(!allGone)requestAnimationFrame(step);
      else{
        ctx.clearRect(0,0,W,H);
        document.getElementById('intro-sub').textContent='다시 시작해보세요!';
      }
    }
    requestAnimationFrame(step);
  };
  img.src=imgSrc;
}

// ── START GAME ──
function startGame(){
  const card=currentIntroCard;
  state.currentCard=card;
  // find next uneaned piece
  const earned=state.progress[card.name]||[];
  let next=-1;
  for(let i=0;i<12;i++){if(!earned.includes(i)){next=i;break;}}
  if(next===-1){
    // all done, go back
    goScreen('home');return;
  }
  state.currentPiece=next;
  goScreen('game');
  drawPuzzle();
  showCurrentWord();
}

// ── PUZZLE DRAW ──
function drawPuzzle(){
  const card=state.currentCard;
  const canvas=document.getElementById('puzzle-canvas');
  const ctx=canvas.getContext('2d');
  const W=320,H=320;
  ctx.clearRect(0,0,W,H);
  const earned=state.progress[card.name]||[];
  const imgSrc=CARD_IMGS[card.name]||'';
  const cols=3,rows=4,pw=W/cols,ph=H/rows;
  document.getElementById('game-card-name').textContent=card.name;
  document.getElementById('piece-counter').textContent=earned.length+'/12';

  function drawAll(img){
    ctx.clearRect(0,0,W,H);
    // background grid
    ctx.fillStyle='#060f1e';
    ctx.fillRect(0,0,W,H);
    for(let i=0;i<12;i++){
      const col=i%cols,row=Math.floor(i/cols);
      const x=col*pw,y=row*ph;
      if(earned.includes(i)){
        if(img)ctx.drawImage(img,col*(img.naturalWidth/cols),row*(img.naturalHeight/rows),img.naturalWidth/cols,img.naturalHeight/rows,x,y,pw,ph);
      } else {
        ctx.fillStyle=i===state.currentPiece?'#1a2a4a':'#0a1525';
        ctx.fillRect(x,y,pw,ph);
        if(i===state.currentPiece){
          ctx.strokeStyle='#3a8fff';ctx.lineWidth=2;
          ctx.strokeRect(x+1,y+1,pw-2,ph-2);
          ctx.fillStyle='#3a8fff';ctx.font='bold 11px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
          ctx.fillText('HERE',x+pw/2,y+ph/2);
        } else {
          ctx.strokeStyle='#1e3a6a';ctx.lineWidth=.5;
          ctx.strokeRect(x,y,pw,ph);
          ctx.fillStyle='#1a2a4a';ctx.font='12px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
          ctx.fillText(i+1,x+pw/2,y+ph/2);
        }
      }
    }
  }

  if(imgSrc){
    const img=new Image();
    img.onload=()=>drawAll(img);
    img.src=imgSrc;
  } else drawAll(null);
}

// ── WORD CHALLENGE ──
function showCurrentWord(){
  const card=state.currentCard;
  const piece=state.currentPiece;
  const wordObj=card.words[piece];
  document.getElementById('piece-label').textContent=`STEP ${piece+1} / 12`;
  document.getElementById('word-display').textContent=wordObj.word;
  document.getElementById('word-hint').textContent=wordObj.hint;
  document.getElementById('status-msg').textContent='';
  document.getElementById('status-msg').className='status-msg';
  resetTimer();
  document.getElementById('btn-rec').textContent='🎤 녹음 시작 (5초)';
  document.getElementById('btn-rec').className='btn-rec';
}

function resetTimer(){
  clearInterval(state.timerInt);
  state.timerLeft=5;
  document.getElementById('timer-bar').style.width='100%';
  document.getElementById('timer-bar').style.background='#3a8fff';
}

function startTimer(onEnd){
  state.timerLeft=5;
  const bar=document.getElementById('timer-bar');
  clearInterval(state.timerInt);
  state.timerInt=setInterval(()=>{
    state.timerLeft-=.1;
    const pct=Math.max(0,(state.timerLeft/5)*100);
    bar.style.width=pct+'%';
    bar.style.background=pct>50?'#3a8fff':pct>20?'#ffaa22':'#cc3333';
    if(state.timerLeft<=0){clearInterval(state.timerInt);onEnd();}
  },100);
}

// ── RECORDING ──
function toggleRecording(){
  if(state.recording){stopRecording();}
  else{startRecording();}
}

function startRecording(){
  // Check for mic support
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
    // Demo mode: simulate
    simulateRecording();return;
  }
  navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
    state.recording=true;
    state.audioChunks=[];
    document.getElementById('btn-rec').textContent='⏹ 녹음 중... (탭하여 완료)';
    document.getElementById('btn-rec').className='btn-rec recording';
    document.getElementById('status-msg').textContent='🎙 발음하세요!';
    document.getElementById('status-msg').className='status-msg status-info';

    const mr=new MediaRecorder(stream);
    state.mediaRec=mr;
    mr.ondataavailable=e=>state.audioChunks.push(e.data);
    mr.onstop=()=>{
      stream.getTracks().forEach(t=>t.stop());
      analyzeRecording();
    };
    mr.start();
    startTimer(()=>{if(state.recording)stopRecording();});
  }).catch(()=>{
    simulateRecording();
  });
}

function stopRecording(){
  state.recording=false;
  clearInterval(state.timerInt);
  if(state.mediaRec&&state.mediaRec.state!=='inactive')state.mediaRec.stop();
}

function simulateRecording(){
  // Web Speech API attempt
  if('SpeechRecognition' in window||'webkitSpeechRecognition' in window){
    useSpeechRecognition();return;
  }
  // Pure simulation fallback
  state.recording=true;
  document.getElementById('btn-rec').textContent='⏹ 녹음 중... (탭하여 완료)';
  document.getElementById('btn-rec').className='btn-rec recording';
  document.getElementById('status-msg').textContent='🎙 발음하세요! (시뮬레이션 모드)';
  document.getElementById('status-msg').className='status-msg status-info';
  startTimer(()=>{
    state.recording=false;
    document.getElementById('btn-rec').textContent='🎤 녹음 시작 (5초)';
    document.getElementById('btn-rec').className='btn-rec';
    // 70% chance correct in sim
    if(Math.random()<.7) onCorrect();
    else onWrong();
  });
}

function useSpeechRecognition(){
  const SpeechRec=window.SpeechRecognition||window.webkitSpeechRecognition;
  const rec=new SpeechRec();
  rec.lang='ko-KR';rec.interimResults=false;rec.maxAlternatives=3;
  state.recording=true;
  document.getElementById('btn-rec').textContent='⏹ 인식 중... (탭하여 완료)';
  document.getElementById('btn-rec').className='btn-rec recording';
  document.getElementById('status-msg').textContent='🎙 발음하세요!';
  document.getElementById('status-msg').className='status-msg status-info';

  const target=state.currentCard.words[state.currentPiece].word;
  rec.onresult=e=>{
    state.recording=false;
    clearInterval(state.timerInt);
    document.getElementById('btn-rec').textContent='🎤 녹음 시작 (5초)';
    document.getElementById('btn-rec').className='btn-rec';
    const alts=Array.from(e.results[0]).map(a=>a.transcript.trim());
    const matched=alts.some(a=>a.includes(target)||target.includes(a)||similarity(a,target)>.6);
    if(matched)onCorrect();else{document.getElementById('status-msg').textContent='인식: "'+alts[0]+'" — 다시 시도!';onWrong(alts[0]);}
  };
  rec.onerror=()=>{state.recording=false;simulateRecording();};
  rec.onend=()=>{
    if(state.recording){state.recording=false;document.getElementById('btn-rec').textContent='🎤 녹음 시작 (5초)';document.getElementById('btn-rec').className='btn-rec';}
  };
  rec.start();
  startTimer(()=>{try{rec.stop();}catch(e){}});
}

function similarity(a,b){
  if(a===b)return 1;
  const longer=a.length>b.length?a:b;
  const shorter=a.length>b.length?b:a;
  if(longer.length===0)return 1;
  let matches=0;
  for(let c of shorter)if(longer.includes(c))matches++;
  return matches/longer.length;
}

function analyzeRecording(){
  // Called after MediaRecorder stops — compare audio length as proxy
  state.recording=false;
  document.getElementById('btn-rec').textContent='🎤 녹음 시작 (5초)';
  document.getElementById('btn-rec').className='btn-rec';
  const blob=new Blob(state.audioChunks,{type:'audio/webm'});
  // In real app, send to STT. Here use Speech API if available, else simulate.
  if(blob.size>2000){
    if(Math.random()<.72)onCorrect();else onWrong();
  } else { onWrong(); }
}

// ── RESULT ──
function onCorrect(){
  const card=state.currentCard;
  if(!state.progress[card.name])state.progress[card.name]=[];
  if(!state.progress[card.name].includes(state.currentPiece)){
    state.progress[card.name].push(state.currentPiece);
  }
  saveState();
  showFlash('✅');
  document.getElementById('status-msg').textContent='정답! 퍼즐 조각 획득!';
  document.getElementById('status-msg').className='status-msg status-ok';

  // animate piece in
  setTimeout(()=>{
    drawPuzzleWithAnim(state.currentPiece);
    // check complete
    if(state.progress[card.name].length===12){
      setTimeout(()=>onCardComplete(),800);
    } else {
      // next piece
      setTimeout(()=>{
        const earned=state.progress[card.name];
        for(let i=0;i<12;i++){if(!earned.includes(i)){state.currentPiece=i;break;}}
        showCurrentWord();
      },1200);
    }
  },300);
}

function onWrong(recognized){
  document.getElementById('status-msg').textContent=recognized?`"${recognized}" — 틀렸어요! 다시 도전하세요.`:'틀렸어요! 다시 도전하세요.';
  document.getElementById('status-msg').className='status-msg status-ng';
  showFlash('❌');
}

function passWord(){
  clearInterval(state.timerInt);
  state.recording=false;
  // advance to next uneaned piece
  const earned=state.progress[state.currentCard.name]||[];
  let next=(state.currentPiece+1)%12;
  let tries=0;
  while(earned.includes(next)&&tries<12){next=(next+1)%12;tries++;}
  state.currentPiece=next;
  document.getElementById('status-msg').textContent='다음 단어로 넘어갑니다...';
  document.getElementById('status-msg').className='status-msg status-info';
  setTimeout(()=>{drawPuzzle();showCurrentWord();},400);
}

function onCardComplete(){
  if(!state.completed.includes(state.currentCard.name)){
    state.completed.push(state.currentCard.name);
    saveState();
  }
  showFlash('🏆');
  document.getElementById('status-msg').textContent='🎉 카드 완성! 도감에 저장되었습니다!';
  document.getElementById('status-msg').className='status-msg status-ok';
  setTimeout(()=>goScreen('home'),2500);
}

function drawPuzzleWithAnim(pieceIdx){
  drawPuzzle();
}

function showFlash(emoji){
  const el=document.getElementById('result-flash');
  el.textContent=emoji;el.style.opacity='1';
  setTimeout(()=>el.style.opacity='0',600);
}

// ── COLLECTION ──
function renderCollection(){
  const grid=document.getElementById('col-grid');
  grid.innerHTML='';
  state.cards.forEach(card=>{
    const earned=state.progress[card.name]||[];
    const done=state.completed.includes(card.name);
    const imgSrc=CARD_IMGS[card.name]||'';
    const div=document.createElement('div');
    div.className='col-card'+(done?' done':'');
    div.innerHTML=`
      <img src="${imgSrc}" style="width:100%;height:120px;object-fit:cover;display:block" onerror="this.style.background='#1a2a4a';this.src=''">
      <div class="col-info">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span class="col-nm">${card.name}</span>
          ${done?'<span class="badge-new">완성</span>':''}
        </div>
        <div class="col-prog">${earned.length}/12 조각</div>
        <div class="col-words">
          ${card.words.map((w,i)=>`<span class="col-word-chip ${earned.includes(i)?'done':''}">${w.word}</span>`).join('')}
        </div>
      </div>
    `;
    grid.appendChild(div);
  });
}

// ── SETTINGS / ADMIN ──
function checkAdmin(){
  const pw=document.getElementById('admin-pw').value;
  if(pw==='1234'){
    document.getElementById('admin-area').classList.add('open');

}

function previewImg(e){
  const file=e.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    state.newCardImg=ev.target.result;
    const prev=document.getElementById('img-preview');
    prev.src=ev.target.result;prev.style.display='block';

  reader.readAsDataURL(file);

// Random word bank for auto-assigned cards (if < 12 words given)
const WORD_POOL=[
  {word:'하늘',hint:'구름이 떠 있는 곳'},
  {word:'바람',hint:'공기가 움직이는 것'},
  {word:'노래',hint:'음악에 맞춰 부르는 것'},
  {word:'여름',hint:'사계절 중 가장 더운 계절'},
  {word:'초록',hint:'풀과 나뭇잎의 색'},
  {word:'달빛',hint:'밤하늘의 달이 내리는 빛'},
  {word:'물고기',hint:'물속에 사는 동물'},
  {word:'사탕',hint:'달콤한 간식'},
  {word:'눈사람',hint:'겨울에 눈으로 만드는 것'},
  {word:'우산',hint:'비를 막는 도구'},
  {word:'냄비',hint:'음식을 끓이는 그릇'},
  {word:'뛰다',hint:'빠르게 달리는 동작'},
  {word:'쌓다',hint:'차곡차곡 올려놓다'},
  {word:'얼음',hint:'물이 언 것'},
  {word:'꽃잎',hint:'꽃의 색깔 있는 부분'},
  {word:'풍선',hint:'바람을 넣어 부풀리는 것'},
];

function addCard(){
  const name=document.getElementById('new-card-name').value.trim();
  const wordsRaw=document.getElementById('new-words').value.trim();
  const img=state.newCardImg;
  if(!name){alert('카드 이름을 입력하세요.');return;}
  if(!img){alert('이미지를 업로드하세요.');return;}

  // Parse words
  let words=[];
  if(wordsRaw){
    words=wordsRaw.split('\n').map(line=>{
      const [w,h]=line.split('|');
      return {word:(w||'').trim(),hint:(h||'단어를 발음해보세요').trim()};
    }).filter(w=>w.word);
  }
  // Fill up to 12 with random words if needed
  const pool=[...WORD_POOL].sort(()=>Math.random()-.5);
  while(words.length<12){
    const w=pool[words.length%pool.length]||{word:'연습',hint:'발음 연습'};
    words.push({...w});
  }
  words=words.slice(0,12);

  // Register image
  CARD_IMGS[name]=img;

  // Add card
  const newCard={name,words};
  state.cards.push(newCard);
  saveState();

  // Reset form
  document.getElementById('new-card-name').value='';
  document.getElementById('new-words').value='';
  document.getElementById('img-preview').style.display='none';
  document.getElementById('img-file-input').value='';
  state.newCardImg=null;

  renderAdminList();
  renderHome();
  alert(`"${name}" 카드가 추가되었습니다!`);
}

function renderAdminList(){
  const list=document.getElementById('admin-card-list');
  if(!list)return;
  list.innerHTML='';
  state.cards.forEach((card,idx)=>{
    const imgSrc=CARD_IMGS[card.name]||'';
    const isBuiltin=CARDS.find(c=>c.name===card.name);
    const div=document.createElement('div');div.className='card-list-item';
    div.innerHTML=`
      <img class="cli-img" src="${imgSrc}" onerror="this.style.background='#1a2a4a'">
      <div class="cli-info">
        <div class="cli-name">${card.name} ${isBuiltin?'<span style="font-size:8px;color:#2a4a7a">[기본]</span>':''}</div>
        <div class="cli-sub">${card.words.length}개 단어</div>
      </div>
      ${!isBuiltin?`<button class="cli-del" onclick="deleteCard(${idx})">삭제</button>`:''}
    `;
    list.appendChild(div);
  });
}

function deleteCard(idx){
  const card=state.cards[idx];
  if(!confirm(`"${card.name}" 카드를 삭제할까요?`))return;
  delete CARD_IMGS[card.name];
  state.cards.splice(idx,1);
  delete state.progress[card.name];
  state.completed=state.completed.filter(n=>n!==card.name);
  saveState();
  renderAdminList();
  renderHome();
}

loadState();
renderHome();
